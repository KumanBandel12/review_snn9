  <style>
    :root {
      --bg: #FBF7F0; --ink: #1A1208; --accent: #D4522A; 
      --green: #2E7D4F; --green-light: #E8F5EC;
      --card-shadow: 0 4px 24px rgba(26, 18, 8, 0.08);
    }
    body { 
      font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink);
      padding: 2rem 1.5rem; max-width: 800px; margin: 0 auto;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; margin-bottom: 1.5rem; color: var(--ink); text-align: center; }
    
    .search-container {
      position: sticky; top: 1rem; z-index: 100;
      margin-bottom: 2rem;
    }
    .search-bar { 
      width: 100%; padding: 14px 20px; font-size: 1rem; font-family: 'DM Sans', sans-serif;
      border-radius: 100px; border: 2px solid #F0E8D8; 
      box-shadow: var(--card-shadow); outline: none; transition: border-color 0.2s;
    }
    .search-bar:focus { border-color: var(--accent); }
    
    .level-section { 
      margin-bottom: 2.5rem; background: #fff; border-radius: 16px; 
      border: 2px solid #F0E8D8; overflow: hidden; box-shadow: var(--card-shadow);
    }
    .level-header {
      background: var(--accent); color: #fff; padding: 1rem 1.5rem;
    }
    .level-title { 
      font-family: 'Syne', sans-serif; margin: 0; font-size: 1.3rem; 
    }
    .level-desc { font-size: 0.85rem; margin-top: 4px; opacity: 0.9; }
    
    .card-item { padding: 1.2rem 1.5rem; border-bottom: 1px solid #F0E8D8; }
    .card-item:last-child { border-bottom: none; }
    
    .question { font-weight: 700; font-size: 1.05rem; margin-bottom: 8px; display: flex; gap: 8px; align-items: flex-start; }
    .answer-badge { 
      display: inline-flex; align-items: center; gap: 5px; background: var(--green-light); 
      border: 1.5px solid var(--green); color: var(--green); border-radius: 100px; 
      padding: 4px 12px; font-size: 0.8rem; font-weight: 700; font-family: 'Syne', sans-serif;
      margin-bottom: 8px;
    }
    .explanation { 
      font-size: 0.9rem; color: #4A3F2F; border-left: 3px solid #F0E8D8; 
      padding-left: 12px; line-height: 1.6;
    }
    .empty-state { text-align: center; padding: 3rem; color: #4A3F2F; font-weight: 500; }
  </style>
</head>

                "_a": "6e6f6e2d7265736964656e",
                "_f": "50617369656e206173696e6720646920524920746574617020626572707573617420656b6f6e6f6d69206469206e65676172616e796120e28692204e6f6e2d5265736964656e21"
            },
            {
                "text": "TKI menetap permanen di Arab Saudi (5 tahun)",
                "emoji": "\u2708\ufe0f",
                "_a": "6e6f6e2d7265736964656e",
                "_f": "544b49206d656e65746170203e20312074686e207075736174206b6570656e74696e67616e20656b6f6e6f6d692070696e64616820e28692204e6f6e2d5265736964656e21"
            }
        ]
    }
];
    const _dx = (hx) => {
      let str = '';
      for (let i = 0; i < hx.length; i += 2) str += String.fromCharCode(parseInt(hx.substr(i, 2), 16));
      return decodeURIComponent(escape(str));
    };
    
    const content = document.getElementById('content');
    
    function render(filter = '') {
      content.innerHTML = '';
      const lowerFilter = filter.toLowerCase();
      let totalMatch = 0;
      
      LEVEL_DEFS.forEach(level => {
        let levelHTML = `<div class="level-section">
          <div class="level-header">
            <h2 class="level-title">Level ${level.id}: ${level.title}</h2>
            <div class="level-desc">${level.description}</div>
          </div>
          <div class="level-cards">`;
          
        let count = 0;
        
        level.cards.forEach(card => {
          const ans = _dx(card._a);
          const exp = _dx(card._f);
          const basket = level.baskets.find(b => b.id === ans);
          const label = basket ? basket.label : ans;
          
          const textToSearch = `${card.text} ${label} ${exp}`.toLowerCase();
          
          if (textToSearch.includes(lowerFilter)) {
            count++;
            totalMatch++;
            levelHTML += `
              <div class="card-item">
                <div class="question">
                  <span>${card.emoji}</span>
                  <span>${card.text}</span>
                </div>
                <div><span class="answer-badge">✅ ${label}</span></div>
                <div class="explanation">💡 ${exp}</div>
              </div>
            `;
          }
        });
        
        levelHTML += `</div></div>`;
        if (count > 0) content.innerHTML += levelHTML;
      });
      
      if(totalMatch === 0) {
         content.innerHTML = '<div class="empty-state">Tidak ada soal yang cocok dengan pencarian Anda.</div>';
      }
    }
    
    render();
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
      render(e.target.value);
    });
  </script>
</body>
</html>
